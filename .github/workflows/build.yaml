name: Build and Push to GHCR

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- setup go ----------
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      # ---------- build binary ----------
      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -o app .

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/minimal-go-web:${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/minimal-go-web:latest \
            .

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/minimal-go-web:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/minimal-go-web:latest
